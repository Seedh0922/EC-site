<!doctype html>
<html>

<head>
    <title>My first shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<style>
    div {
        border: 1px solid grey;
        padding: 20px;
        width: 300px;
    }

    button {
        background: black;
        color: white;
        border: none;
        border-radius: 5px;
        padding: 10px 15px;
        cursor: pointer;
    }

    button:hover {
        background: darkgray;
    }
</style>

<body>
    <h1>Welcome to My first shop</h1>
    <h1>상품명:
        <span id="title">Apple</span>
    </h1>
    <h2 id="message"></h2>
    <h1>Price : 3000원 </h1>
    <h1>수량
        <span id="count">1</span>
    </h1>
    <button onclick="plus()">+</button>
    <button onclick="minus()">-</button>
    <h1>총가격
        <span id="All">3000</span>
    </h1>
    <button onclick="toggleCart()" id="cartButton">장바구니담기</button>
    <button onclick="buyProduct()" id="buyButton">구매</button>


    <script>
        let isBought = false;
        let isInCart = false;
        let count = 1;
        function plus() {
            if (isInCart == true) {
                alert("장바구니에 담긴 상품입니다.");
                return;
            }
            if (isBought == true) {
                alert("이미 구매한 상품입니다.");
                return;
            }
            if (count < 10) {
                count = count + 1;
                document.getElementById("count").innerText = count;
                document.getElementById("All").innerText = 3000 * count;
            } else {
                alert("최대 수량은 10개입니다.");
            }
        }

        function minus() {
            if (isInCart == true) {
                alert("장바구니에 담긴 상품입니다.");
                return;
            }
            if (isBought == true) {
                alert("이미 구매한 상품입니다.");
                return;
            }
            if (count > 1) {
                count = count - 1;
            } else {
                alert("최소 수량은 1개입니다.");
            }
            document.getElementById("count").innerText = count;
            document.getElementById("All").innerText = 3000 * count;
        }
        function toggleCart() {
            if (isBought == true) {
                alert("이미 구매한 상품입니다.");
                return;
            }
            if (isInCart == false) {
                isInCart = true;
                document.getElementById("message").innerText = "장바구니에 담겼습니다.";
                document.getElementById("title").style.color = "red";
                document.getElementById("cartButton").innerText = "장바구니에서 제거";
            } else {
                isInCart = false;
                document.getElementById("message").innerText = "장바구니에서 제거되었습니다.";
                document.getElementById("title").style.color = "black";
                document.getElementById("cartButton").innerText = "장바구니 담기";
            }
        }

        function buyProduct() {
            if (isBought == false) {
                isBought = true;
                isInCart = false;
                document.getElementById("title").style.color = "blue";
                document.getElementById("message").innerText = "구매가 완료되었습니다.";
                document.getElementById("buyButton").innerText = "구매 취소";
                alert("구매가 완료되었습니다.");
            } else {
                isBought = false;
                isInCart = false;
                document.getElementById("buyButton").innerText = "구매";
                document.getElementById("message").innerText = "구매가 취소되었습니다.";
                document.getElementById("title").style.color = "black";
                document.getElementById("cartButton").innerText = "장바구니 담기";
                return;
            }


        }
    </script>

</body>

</html>
