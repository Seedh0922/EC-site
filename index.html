<!doctype html>
<html>
<head>
    <title>My first shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <h1>Welcome to My first shop</h1>
    <h1>상품명:<span id="productName"></span></h1>
    <h2>Price : <span id="price"></span>원 </h2>
    <h3>설명 : <span id="description"></span></h3>
    <h2 id="message"></h2>
    <h1>수량
        <span id="count">1</span>
    </h1>
    <button onclick="plus()">+</button>
    <button onclick="minus()">-</button>
    <h1>총가격
        <span id="All">3000</span>
    </h1>
    <button onclick="toggleCart()" id="cartButton">장바구니담기</button>
    <button onclick="buyProduct()" id="buyButton">구매</button>
    <button onclick="nextProduct()">다음 상품</button>
    <script src="index.js"></script>

</body>

</html>
